<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortes Lima Engenharia | Dashboard Administrativa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="dashboard-screen">
        <nav class="dash-nav">
            <div class="logo">Cortes Lima <span class="nav-tag">| Painel de Controle Geral</span></div>
            <button id="btn-sair" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
        </nav>

        <main class="dash-container">
            <div class="dash-header">
                <div>
                    <h2>Acompanhamento Técnico (Geral)</h2>
                    <p>Controle total de obras e atribuição de acesso aos clientes.</p>
                </div>
                <button id="btn-novo-projeto" class="btn-gold wide"><i class="fa-solid fa-plus"></i> Cadastrar Nova Obra</button>
            </div>

            <div id="lista-projetos" class="projects-grid"></div>
        </main>
    </div>

    <div id="project-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span id="close-modal" class="close-btn">&times;</span>
            <h3 id="modal-title">Cadastrar Projeto</h3>
            
            <form id="project-form">
                <input type="hidden" id="project-id"> 
                
                <div class="form-field">
                    <label for="proj-nome">Nome do Empreendimento</label>
                    <input type="text" id="proj-nome" required>
                </div>

                <div class="form-field">
                    <label for="proj-tipo">Segmento / Tipo</label>
                    <input type="text" id="proj-tipo" placeholder="Ex: Incorporação Residencial" required>
                </div>

                <div class="form-field">
                    <label for="proj-email-cliente">E-mail do Cliente (Para Visualização)</label>
                    <input type="email" id="proj-email-cliente" placeholder="exemplo@cliente.com" required>
                </div>

                <div class="form-field">
                    <label for="proj-progresso">Avanço Físico Atual (%)</label>
                    <input type="number" id="proj-progresso" min="0" max="100" required>
                </div>

                <div class="form-field">
                    <label for="proj-nota">Diário de Obra <span class="optional">(Opcional)</span></label>
                    <textarea id="proj-nota"></textarea>
                </div>

                <button type="submit" class="btn-gold shadow">Salvar Alterações</button>
            </form>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
