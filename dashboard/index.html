<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortes Lima Engenharia | Acesso ao Sistema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="auth-overlay">
        <div class="login-box">
            <h1 class="logo">Cortes Lima</h1>
            <p class="subtitle">Painel Controladoria de Obras</p>
            <form id="login-form">
                <div class="form-group-login">
                    <input type="email" id="login-email" placeholder="E-mail de Acesso" required>
                </div>
                <div class="form-group-login">
                    <input type="password" id="login-password" placeholder="Senha" required>
                </div>
                <button type="submit" class="btn-gold">Entrar no Sistema</button>
                <p id="login-error" class="error-msg"></p>
            </form>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
